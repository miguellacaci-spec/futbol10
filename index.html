<div class="play-side">
    <div class="word-container" id="wordDisplay"></div>
    
    <div id="qwerty-keyboard" class="keyboard-container"></div>

    <div class="controls">
        <div class="input-group">
            <input type="text" id="wordInput" placeholder="¿Sabes el nombre completo?">
            <button id="solveButton" class="secondary-btn">RESOLVER</button>
        </div>
    </div>

    <div class="info-footer">
        <div class="status-item">Vidas: <span id="lives">6</span></div>
        <div class="status-item">Racha: <span id="streak">0</span></div>
    </div>
</div>
