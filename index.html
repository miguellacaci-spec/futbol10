<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol10 - Minijuegos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="menu-screen" class="screen">
            <h1 class="logo">Futbol<span>10</span></h1>
            <div class="menu-grid">
                <div class="menu-card" onclick="showCategory('laliga')">
                    <div class="icon">рџ‡Єрџ‡ё</div>
                    <h3>LaLiga EA Sports</h3>
                    <p>Equipos de EspaГ±a</p>
                </div>
                <div class="menu-card" onclick="showCategory('premier')">
                    <div class="icon">рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї</div>
                    <h3>Premier League</h3>
                    <p>Equipos de Inglaterra</p>
                </div>
                <div class="menu-card" onclick="showCategory('leyendas')">
                    <div class="icon">рџЏ†</div>
                    <h3>Leyendas</h3>
                    <p>Jugadores histГіricos</p>
                </div>
            </div>
        </div>

        <div id="category-screen" class="screen hidden">
            <nav class="game-nav">
                <button onclick="showMenu()" class="back-btn">в†ђ Volver al inicio</button>
            </nav>
            <h2 id="category-title" class="logo" style="font-size: 2rem; margin-top: 1rem;"></h2>
            <div class="menu-grid" id="category-games-grid"></div>
        </div>

        <div id="hangman-screen" class="screen hidden">
            <nav class="game-nav">
                <button onclick="backToCategory()" class="back-btn">в†ђ Volver</button>
                <div class="score-board">Racha: <span id="streak">0</span></div>
            </nav>

            <div class="game-layout">
                <div class="canvas-side">
                    <canvas id="hangmanCanvas" width="220" height="280"></canvas>
                </div>
                
                <div class="play-side">
                    <div class="word-container" id="wordDisplay"></div>
                    <div id="qwerty-keyboard" class="keyboard-container"></div>
                    <div class="controls">
                        <div class="input-container">
                            <div class="input-group">
                                <input type="text" id="wordInput" placeholder="ВїSabes el nombre completo?" autocomplete="off">
                                <button id="solveButton" class="secondary-btn">RESOLVER</button>
                            </div>
                            <div id="hangman-suggestions" class="suggestions-box"></div>
                        </div>
                    </div>
                    <div class="info-footer">
                        <p>Vidas: <span id="lives">6</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="blur-screen" class="screen hidden">
            <nav class="game-nav">
                <button onclick="backToCategory()" class="back-btn">в†ђ Volver</button>
                <div class="score-board">Racha: <span id="blur-streak">0</span></div>
            </nav>

            <div class="blur-container">
                <div class="image-box">
                    <img id="playerImg" src="" alt="Jugador">
                </div>
                
                <div class="blur-controls">
                    <div class="input-container">
                        <div class="input-group">
                            <input type="text" id="blurInput" placeholder="ВїQuiГ©n es este jugador?" autocomplete="off">
                            <button id="btnBlurCheck" class="secondary-btn">ENVIAR</button>
                        </div>
                        <div id="blur-suggestions" class="suggestions-box"></div>
                    </div>
                    <p>Intentos: <span id="blur-lives">5</span></p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
